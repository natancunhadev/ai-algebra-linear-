
    <html>
    <head>
        <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    </head>
    <body>
        <div id="grafico" style="width:100%;height:100vh;"></div>

        <script>

            const inputs = {
                x: [0, 1],
                y: [0, 2],
                z: [0, 3],
                mode: 'lines+markers',
                type: 'scatter3d',
                name: 'Vetor Inputs',
                line: { width: 6 }
            };

            const weights = {
                x: [0, 0.5],
                y: [0, 0.2],
                z: [0, 0.8],
                mode: 'lines+markers',
                type: 'scatter3d',
                name: 'Vetor Weights',
                line: { width: 6 }
            };

            const data = [inputs, weights];

            const layout = {
                title: 'Visualização 3D - Álgebra Linear em IA',
                scene: {
                    xaxis: { title: 'X' },
                    yaxis: { title: 'Y' },
                    zaxis: { title: 'Z' }
                }
            };

            Plotly.newPlot('grafico', data, layout);

        </script>
    </body>
    </html>
